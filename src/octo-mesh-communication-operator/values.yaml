# Default values for octoMeshCommunicationOperator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

octo-mesh-crds:
  enabled: true
  
configMap:
  kestrelHttpUrl: http://0.0.0.0:5000
  kestrelHttpsUrl: https://0.0.0.0:5001
  certKeyPath: /certs/svc-key.pem
  certPath: /certs/svc.pem

replicaCount: 1

serviceHooks:
  # certificate with private and public key in pfx format, by command arg 
  caKey: ""
  caCrt: ""
  svcKey: ""
  svcCrt: ""

pod:
  httpPort: 5000
  httpsPort: 5001

image:
  repository: meshmakers/octo-communication-operator
  pullPolicy: IfNotPresent
  # private registry to pull images from
  privateRegistry: ""
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""  
  
secrets:
  # content of the root ca certificate chain
  rootCa: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Name of image pull secret to apply to adapter pods created by the operator.
# When set, adapter deployments include this secret for pulling container images.
adapterImagePullSecretName: ""

# === RBAC scope ===
# Controls whether the operator gets cluster-wide or namespace-scoped Kubernetes
# permissions. Cluster scope is the historical default and matches the previous
# chart behaviour. Namespace scope is required when running multiple operator
# instances on the same cluster (e.g. one per target communication controller
# on an edge device) so that each operator's RBAC stays within its own
# namespace and they don't compete for the same CommunicationPool CRs. Pair
# namespace scope with `operator.watchNamespace` so the CR watcher matches the
# RBAC reach.
rbac:
  # "cluster" → ClusterRole + ClusterRoleBinding (default; backward compatible)
  # "namespace" → Role + RoleBinding scoped to .Release.Namespace
  scope: cluster

# === Central operator mode ===
# Controls whether the operator runs as a "central operator" — i.e. it connects
# to the Communication Controller via SignalR (/operatorHub) and listens for
# tenant lifecycle events. When enabled, the operator auto-creates and auto-
# deletes CommunicationPool CRs and per-tenant broker secrets.
# When disabled (default), the operator only reconciles CommunicationPool CRs
# created externally (edge deployment).
operator:
  # Master switch for central operator mode. When true,
  # `operator.communicationControllerUri`, `broker.host`, `broker.username`,
  # and `broker.password` MUST be set.
  autoManagePools: false

  # Restricts the operator's CR watcher to a single namespace. When empty
  # (default), the operator watches all namespaces cluster-wide. Set this to
  # `.Release.Namespace` (or the same namespace value used at install time)
  # when running multiple operator instances on one cluster — without it, the
  # KubeOps watcher sees every CommunicationPool CR in the cluster and
  # multiple operators will fight over the same resources. Typically paired
  # with `rbac.scope=namespace`.
  watchNamespace: ""

  # Cluster-internal URI of the Communication Controller. The /operatorHub
  # SignalR path is appended by the operator. Typical value:
  # https://octo-mesh-communication-controller-services
  communicationControllerUri: ""

  # Namespace where auto-created CommunicationPool CRs, per-tenant broker
  # secrets, and the resulting adapter Deployments/Services are placed. All
  # artefacts of a managed pool live here. Must exist before installation.
  poolNamespace: octo

  # Pool name used in auto-created CommunicationPool CRs.
  defaultPoolName: default

  # Forwarded to adapter pods as OCTO_ADAPTER__INSTANCEPREFIX. Disambiguates
  # OctoMesh installations that share the same RabbitMQ broker.
  instancePrefix: ""

  # If true, adapter pods skip TLS certificate validation when connecting to
  # the Communication Controller. Use only for local/dev clusters.
  adapterIgnoreCertificateValidation: false

  # Cluster-internal URI of the reporting service. Projected into each
  # workload's Helm values as `reportingServiceUri`. Leave empty in edge
  # clusters that do not host a reporting service.
  reportingServiceUri: ""

  # Private container registry the cluster pulls workload images from
  # (e.g. "docker.mm.cloud"). When set, projected into each workload's
  # `image.privateRegistry` so the chart renders the image reference as
  # `{registry}/{repository}:{tag}` instead of pulling from docker.io.
  imageRegistry: ""

  # Cluster-internal service endpoints projected into every deployed
  # workload's Helm values. Each field is optional — only those that are
  # set are injected. Edge operators typically leave the cloud-side hosts
  # empty so per-workload values can supply local equivalents.
  clusterDependencies:
    mongodbHost: ""
    mongodbReplicaSet: ""
    rabbitMqHost: ""
    rabbitMqUser: ""
    streamDataHost: ""
    streamDataUser: ""

  # Cluster-wide ingress defaults projected into every deployed workload's
  # Helm values. Per-workload ValuesYaml or structured overrides can still
  # override individual annotations.
  ingress:
    className: ""
    clusterIssuer: ""
    # tls: true / false — leave unset to keep the chart default.
    tls: ""

  # Cluster-side credentials the operator may inject into workloads that
  # opt in via Adapter.ReceivesClusterSecrets. Each field is optional —
  # only those that are set get packaged into the chart-owned
  # `<fullname>-cluster-secrets` Secret and referenced by the operator via
  # secretKeyRef. The RabbitMQ password reuses the existing `broker.password`
  # value; everything else lives here. Override these in production via the
  # deployment pipeline (Vault) rather than by checking values into git.
  clusterSecrets:
    mongodbUserPassword: ""
    mongodbAdminPassword: ""
    streamDataPassword: ""

# === RabbitMQ broker for adapter pods ===
# These connection details are written by the operator into per-tenant
# `<tenantId>-<poolName>-octo-mesh-connection` Secrets, which adapter pods
# consume. Required when `operator.autoManagePools` is true.
broker:
  # Hostname of the RabbitMQ broker. In-cluster typically the Service name.
  host: ""

  # AMQP virtual host. Default "/" works for stock RabbitMQ.
  virtualHost: "/"

  # AMQP port. 5672 = plain, 5671 = TLS.
  port: 5672

  # Credentials are rendered into a Helm-managed Kubernetes Secret and
  # injected into the operator pod via secretKeyRef — they do NOT appear in
  # the rendered Deployment manifest. In production, override via --set,
  # External Secrets, or Sealed Secrets.
  username: ""
  password: ""


podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 443

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  timeoutSeconds: 1
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 15
  timeoutSeconds: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
