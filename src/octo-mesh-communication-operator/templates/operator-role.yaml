apiVersion: rbac.authorization.k8s.io/v1
{{- if eq .Values.rbac.scope "namespace" }}
kind: Role
metadata:
  name: {{ printf "%s-operator-operator-role" (include "octoMeshCommunicationOperator.fullname" .) }}
  namespace: {{ .Release.Namespace }}
{{- else }}
kind: ClusterRole
metadata:
  name: {{ printf "%s-operator-operator-role" (include "octoMeshCommunicationOperator.fullname" .) }}
{{- end }}
rules:
- apiGroups:
  - octo-mesh.meshmakers.io
  resources:
  - communicationpools
  verbs:
  - '*'
- apiGroups:
  - ""
  resources:
  - services
  - secrets
  - configmaps
  - serviceaccounts
  verbs:
  - '*'
- apiGroups:
  - apps
  resources:
  - statefulsets
  - deployments
  - replicasets
  verbs:
  - '*'
# Helm's --atomic / --wait flags poll Pod status when waiting for the
# release to become Ready. Read-only on pods is enough — the actual pod
# spec is managed indirectly via the Deployment.
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
# Helm-managed adapter / application charts render an Ingress when
# `.Values.ingress.enabled` is set, so the operator needs to own them in
# its pool namespace (same scope as Deployment/Service/Secret above).
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - '*'
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - create
  - update
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - '*'
- apiGroups:
  - octo-mesh.meshmakers.io
  resources:
  - communicationpools/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - apps
  resources:
  - statefulsets/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - apps
  resources:
  - deployments/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - services/status
  verbs:
  - get
  - update
  - patch
