apiVersion: rbac.authorization.k8s.io/v1
{{- if eq .Values.rbac.scope "namespace" }}
kind: Role
metadata:
  name: {{ printf "%s-operator-operator-role" (include "octoMeshCommunicationOperator.fullname" .) }}
  namespace: {{ .Release.Namespace }}
{{- else }}
kind: ClusterRole
metadata:
  name: {{ printf "%s-operator-operator-role" (include "octoMeshCommunicationOperator.fullname" .) }}
{{- end }}
rules:
- apiGroups:
  - octo-mesh.meshmakers.io
  resources:
  - communicationpools
  verbs:
  - '*'
- apiGroups:
  - ""
  resources:
  - services
  - secrets
  verbs:
  - '*'
- apiGroups:
  - apps
  resources:
  - statefulsets
  - deployments
  verbs:
  - '*'
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - create
  - update
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - '*'
- apiGroups:
  - octo-mesh.meshmakers.io
  resources:
  - communicationpools/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - apps
  resources:
  - statefulsets/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - apps
  resources:
  - deployments/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - services/status
  verbs:
  - get
  - update
  - patch
