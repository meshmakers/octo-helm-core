{{- include "octoMeshCommunicationOperator.webhookCerts" . -}}
{{- $certs := index $ "_webhookCerts" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-webhook-ca" (include "octoMeshCommunicationOperator.fullname" .) }}
  labels:
    {{- include "octoMeshCommunicationOperator.labels" . | nindent 4 }}
type: Opaque
data:
  ca-key.pem: {{ $certs.caKey | b64enc | quote }}
  ca.pem: {{ $certs.caCrt | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-webhook-cert" (include "octoMeshCommunicationOperator.fullname" .) }}
  labels:
    {{- include "octoMeshCommunicationOperator.labels" . | nindent 4 }}
type: Opaque
data:
  svc-key.pem: {{ $certs.svcKey | b64enc | quote }}
  svc.pem: {{ $certs.svcCrt | b64enc | quote }}
---
{{- if .Values.secrets.rootCa }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-ca" (include "octoMeshCommunicationOperator.fullname" .) }}
  labels:
    {{- include "octoMeshCommunicationOperator.labels" . | nindent 4 }}
type: Opaque
data:
  {{- include "checkMandatoryValue" (dict "name" "secrets.rootCa" "value" .Values.secrets.rootCa) }}
  root-ca.pem: {{ .Values.secrets.rootCa | b64enc | quote }}
{{- end }}
{{- if .Values.operator.autoManagePools }}
{{- include "checkMandatoryValue" (dict "name" "operator.communicationControllerUri" "value" .Values.operator.communicationControllerUri) }}
{{- include "checkMandatoryValue" (dict "name" "broker.host" "value" .Values.broker.host) }}
{{- include "checkMandatoryValue" (dict "name" "broker.username" "value" .Values.broker.username) }}
{{- include "checkMandatoryValue" (dict "name" "broker.password" "value" .Values.broker.password) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-broker" (include "octoMeshCommunicationOperator.fullname" .) }}
  labels:
    {{- include "octoMeshCommunicationOperator.labels" . | nindent 4 }}
type: Opaque
data:
  broker-user: {{ .Values.broker.username | b64enc | quote }}
  broker-password: {{ .Values.broker.password | b64enc | quote }}
{{- end }}
{{- $cs := .Values.operator.clusterSecrets }}
{{- if or $cs.mongodbUserPassword $cs.mongodbAdminPassword $cs.streamDataPassword }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-cluster-secrets" (include "octoMeshCommunicationOperator.fullname" .) }}
  labels:
    {{- include "octoMeshCommunicationOperator.labels" . | nindent 4 }}
type: Opaque
data:
{{- with $cs.mongodbUserPassword }}
  mongodb-user-password: {{ . | b64enc | quote }}
{{- end }}
{{- with $cs.mongodbAdminPassword }}
  mongodb-admin-password: {{ . | b64enc | quote }}
{{- end }}
{{- with $cs.streamDataPassword }}
  stream-data-password: {{ . | b64enc | quote }}
{{- end }}
{{- end }}
