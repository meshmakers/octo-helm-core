
# This will pass the client id to the demo app
clientId: "octo-demo-app"

# The public uri of the demo app
publicUri: https://demoapp.example.com
# the uri of the admin panel
adminPanelUri: https://adminpanel.example.com

image:
  privateRegistry: <registry url>
  tag: 3.1.0
  
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "demo"
  tls: true